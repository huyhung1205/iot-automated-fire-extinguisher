name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and build-tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Ensure Gradle wrapper is executable
        working-directory: SmartFireMonitoring
        run: chmod +x gradlew

      - name: Restore Firebase config
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            echo "::error::Missing secret GOOGLE_SERVICES_JSON. Add your app/google-services.json content as a repository secret."
            exit 1
          fi
          printf '%s' '${{ secrets.GOOGLE_SERVICES_JSON }}' > SmartFireMonitoring/app/google-services.json

      - name: Build debug APK
        working-directory: SmartFireMonitoring
        run: bash ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Prepare release artifact
        run: |
          cp SmartFireMonitoring/app/build/outputs/apk/debug/app-debug.apk SmartFireMonitoring-${{ github.ref_name }}.apk

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: SmartFireMonitoring ${{ github.ref_name }}
          generate_release_notes: true
          files: SmartFireMonitoring-${{ github.ref_name }}.apk
