name: Android APK Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: SmartFireMonitoring
        run: ./gradlew :app:assembleDebug

      - name: Prepare release artifact
        run: |
          cp SmartFireMonitoring/app/build/outputs/apk/debug/app-debug.apk SmartFireMonitoring-${{ github.ref_name }}.apk

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: SmartFireMonitoring ${{ github.ref_name }}
          generate_release_notes: true
          files: SmartFireMonitoring-${{ github.ref_name }}.apk
